<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>প্রিমিয়াম ক্লায়েন্ট ডেটাবেজ</title>
    <!-- Google Fonts & FontAwesome Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-primary: #0b0f19;
            --bg-surface: #131c2e;
            --bg-input: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --success: #10b981;
            --danger: #ef4444;
            --border: #24334d;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Hind Siliguri', sans-serif; }
        body { background-color: var(--bg-primary); color: var(--text-main); min-height: 100vh; padding: 1.5rem; }
        .container { max-width: 1100px; margin: 0 auto; }

        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2.5rem; gap: 1.5rem; flex-wrap: wrap; border-bottom: 1px solid var(--border); padding-bottom: 1.5rem; }
        .logo-area .text-logo { font-size: 1.8rem; font-weight: 700; background: linear-gradient(45deg, #3b82f6, #10b981); -webkit-background-clip: text; -webkit-text-fill-color: transparent; display: flex; align-items: center; gap: 12px; }
        .logo-area .text-logo i { -webkit-text-fill-color: var(--accent); }
        .logo-area p { font-size: 0.85rem; color: var(--text-muted); margin-top: 2px; }

        .controls { display: flex; align-items: center; gap: 1rem; flex-grow: 1; justify-content: flex-end; max-width: 550px; }
        .search-wrapper { position: relative; width: 100%; }
        .search-wrapper i { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: var(--text-muted); }
        .search-box { width: 100%; padding: 12px 12px 12px 45px; border-radius: 12px; border: 1px solid var(--border); background: var(--bg-surface); color: var(--text-main); font-size: 1rem; transition: all 0.3s; }
        .search-box:focus { outline: none; border-color: var(--accent); }

        .add-btn { background: linear-gradient(135deg, var(--accent), var(--accent-hover)); color: white; border: none; width: 48px; height: 48px; border-radius: 12px; font-size: 1.4rem; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3); }

        .section-title { font-size: 1.15rem; margin-bottom: 1.2rem; color: var(--text-muted); display: flex; align-items: center; gap: 8px; }
        .grid-layout { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1.2rem; margin-bottom: 2.5rem; }

        .client-card { background: var(--bg-surface); border: 1px solid var(--border); border-radius: 16px; padding: 1.25rem; cursor: pointer; transition: all 0.25s ease; }
        .client-card:hover { transform: translateY(-4px); border-color: var(--accent); box-shadow: 0 8px 20px rgba(0,0,0,0.2); }
        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.75rem; }
        .file-badge { background: rgba(59, 130, 246, 0.12); color: #60a5fa; padding: 3px 10px; border-radius: 6px; font-size: 0.85rem; font-weight: 600; }
        .serial-badge { font-size: 0.85rem; color: var(--text-muted); }
        .client-card h3 { font-size: 1.25rem; margin-bottom: 0.6rem; color: var(--text-main); }
        .card-meta { font-size: 0.9rem; color: var(--text-muted); display: flex; flex-direction: column; gap: 6px; }
        .card-meta div { display: flex; align-items: center; gap: 8px; }
        .card-meta i { color: var(--accent); width: 14px; }

        /* Loading Spinner */
        .loading-screen { text-align: center; padding: 3rem; grid-column: 1/-1; color: var(--text-muted); }
        .spinner { border: 4px solid rgba(255,255,255,0.1); width: 36px; height: 36px; border-radius: 50%; border-left-color: var(--accent); animation: spin 1s linear infinite; margin: 0 auto 15px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Modal CSS */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(7, 10, 18, 0.85); backdrop-filter: blur(6px); display: flex; align-items: center; justify-content: center; z-index: 100; opacity: 0; pointer-events: none; transition: opacity 0.3s ease; }
        .modal.active { opacity: 1; pointer-events: auto; }
        .modal-content { background: var(--bg-surface); border: 1px solid var(--border); width: 95%; max-width: 480px; border-radius: 20px; padding: 1.75rem; position: relative; max-height: 90vh; overflow-y: auto; }
        .modal-close { position: absolute; top: 15px; right: 15px; background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 1.3rem; }
        .modal h2 { margin-bottom: 1.2rem; font-size: 1.35rem; display: flex; align-items: center; gap: 10px;}
        .form-group { margin-bottom: 1rem; }
        .form-group label { display: block; margin-bottom: 5px; color: var(--text-muted); font-size: 0.9rem; }
        .form-control { width: 100%; padding: 10px 12px; background: var(--bg-input); border: 1px solid var(--border); border-radius: 8px; color: white; font-size: 0.95rem; }
        .form-control:focus { outline: none; border-color: var(--accent); }
        .submit-btn { width: 100%; background: var(--success); color: white; border: none; padding: 11px; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; margin-top: 0.5rem; }

        /* Profile Screen */
        .profile-view { display: none; animation: fadeIn 0.35s ease; }
        .profile-view.active { display: block; }
        .main-dashboard.hidden { display: none; }
        .back-btn { background: none; border: 1px solid var(--border); color: var(--text-main); padding: 8px 14px; border-radius: 8px; cursor: pointer; display: inline-flex; align-items: center; gap: 8px; margin-bottom: 1.5rem; font-size: 0.95rem; }
        .profile-grid { display: grid; grid-template-columns: 1.2fr 1fr; gap: 2rem; background: var(--bg-surface); padding: 2rem; border-radius: 20px; border: 1px solid var(--border); }
        @media (max-width: 768px) { .profile-grid { grid-template-columns: 1fr; gap: 1.5rem; padding: 1.25rem; } }
        .profile-info h2 { font-size: 2rem; margin-bottom: 1.2rem; color: var(--text-main); font-weight: 700; }
        .info-item { display: flex; align-items: center; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .info-left { display: flex; align-items: center; gap: 12px; color: var(--text-muted); }
        .info-left i { color: var(--accent); font-size: 1.1rem; width: 20px; }
        .info-value { font-weight: 500; text-align: right; color: var(--text-main); }
        .document-area { border: 1px dashed var(--border); border-radius: 12px; padding: 1rem; background: rgba(0,0,0,0.2); display: flex; flex-direction: column; align-items: center; }
        .document-area img { max-width: 100%; max-height: 400px; border-radius: 8px; object-fit: contain; margin-top: 10px; }
        .delete-action-container { margin-top: 2rem; border-top: 1px solid var(--border); padding-top: 1.5rem; }
        .delete-btn { width: 100%; background: rgba(239, 68, 68, 0.1); color: var(--danger); border: 1px solid rgba(239, 68, 68, 0.2); padding: 12px; border-radius: 8px; cursor: pointer; font-weight: 600; display: flex; align-items: center; justify-content: center; gap: 8px; transition: all 0.2s; }
        .delete-btn:hover { background: var(--danger); color: white; }
        .no-data { text-align: center; color: var(--text-muted); padding: 3.5rem 1rem; grid-column: 1/-1; background: var(--bg-surface); border-radius: 16px; border: 1px dashed var(--border); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="container">
        <!-- MAIN DASHBOARD -->
        <main class="main-dashboard" id="mainDashboard">
            <header>
                <div class="logo-area">
                    <div class="text-logo"><i class="fa-solid fa-folder-tree"></i> CLIENTFLOW</div>
                    <p>স্মার্ট অনলাইন ক্লায়েন্ট ডেটাবেজ সিস্টেম (গুগল ক্লাউড সিঙ্ক)</p>
                </div>
                <div class="controls">
                    <div class="search-wrapper">
                        <i class="fa-solid fa-magnifying-glass"></i>
                        <input type="text" class="search-box" id="searchBox" placeholder="ফাইল নাম্বার বা নাম লিখে খুঁজুন...">
                    </div>
                    <button class="add-btn" id="openModalBtn"><i class="fa-solid fa-plus"></i></button>
                </div>
            </header>

            <div id="recentSectionWrapper">
                <div class="section-title"><i class="fa-solid fa-clock-rotate-left" style="color:#fbbf24;"></i> সাম্প্রতিক চুক্তি (গত ৩ দিন)</div>
                <div class="grid-layout" id="recentGrid"></div>
            </div>

            <div id="allSectionWrapper">
                <div class="section-title"><i class="fa-solid fa-box-archive"></i> সকল রেকর্ড আর্কাইভ</div>
                <div class="grid-layout" id="allClientsGrid">
                    <div class="loading-screen"><div class="spinner"></div>গুগল ক্লাউড থেকে ক্লায়েন্ট লিস্ট লোড হচ্ছে...</div>
                </div>
            </div>
        </main>

        <!-- CLIENT PROFILE VIEW -->
        <section class="profile-view" id="profileView">
            <button class="back-btn" id="backBtn"><i class="fa-solid fa-arrow-left"></i> ড্যাশবোর্ডে ফিরে যান</button>
            <div class="profile-grid" id="profileContainer"></div>
        </section>
    </div>

    <!-- ENTRY FORM MODAL -->
    <div class="modal" id="clientModal">
        <div class="modal-content">
            <button class="modal-close" id="closeModalBtn"><i class="fa-solid fa-xmark"></i></button>
            <h2><i class="fa-solid fa-user-plus" style="color: var(--accent);"></i> নতুন ক্লায়েন্ট এন্ট্রি ফর্ম</h2>
            <form id="clientForm">
                <div class="form-group"><label>ফাইল নাম্বার *</label><input type="text" id="fileNo" class="form-control" placeholder="যেমন: Nb-176" required></div>
                <div class="form-group"><label>ক্লায়েন্টের নাম *</label><input type="text" id="clientName" class="form-control" placeholder="যেমন: মানিক" required></div>
                <div class="form-group"><label>কি কাজের জন্য (কাজের বিবরণ) *</label><input type="text" id="jobType" class="form-control" placeholder="যেমন: Canada/রেস্টুরেন্ট" required></div>
                <div class="form-group"><label>ফোন নাম্বার *</label><input type="tel" id="phone" class="form-control" placeholder="যেমন: 01XXXXXXXXX" required></div>
                <div class="form-group"><label>চুক্তি সম্পাদনকারী (স্টাফ/ম্যানেজার নাম) *</label><input type="text" id="handlerName" class="form-control" placeholder="যেমন: Topon" required></div>
                <div class="form-group"><label>চুক্তিপত্রের ছবি *</label><input type="file" id="agreementImg" class="form-control" accept="image/*" required></div>
                <button type="submit" class="submit-btn" id="submitBtn">ক্লাউড ডেটাবেজে সংরক্ষণ করুন</button>
            </form>
        </div>
    </div>

    <!-- FIREBASE SERVICES MODULES CODE -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // আপনার প্রজেক্টের রিয়েল কনফিগ
        const firebaseConfig = {
            apiKey: "AIzaSyAo5NsSb_N-zGCwglxjufqLkWd0ebTS0nw",
            authDomain: "clint-flow-8763d.firebaseapp.com",
            projectId: "clint-flow-8763d",
            storageBucket: "clint-flow-8763d.firebasestorage.app",
            messagingSenderId: "616696869698",
            appId: "1:616696869698:web:3a02391305b100dcfc8edb",
            measurementId: "G-7CEGFWYSQP"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        let allClientsGlobal = [];

        // ডোমেইন এলিমেন্টস ট্র্যাকিং
        document.getElementById('openModalBtn').onclick = () => document.getElementById('clientModal').classList.add('active');
        document.getElementById('closeModalBtn').onclick = () => toggleModal(false);
        document.getElementById('backBtn').onclick = () => {
            document.getElementById('profileView').classList.remove('active');
            document.getElementById('mainDashboard').classList.remove('hidden');
        };
        document.getElementById('searchBox').oninput = handleSearch;
        document.getElementById('clientForm').onsubmit = saveClient;

        function toggleModal(show) {
            const modal = document.getElementById('clientModal');
            if (show) modal.classList.add('active');
            else { modal.classList.remove('active'); document.getElementById('clientForm').reset(); }
        }

        // ক্লাউড থেকে ডেটা নিয়ে আসা (Fetch Data)
        async function fetchClients() {
            try {
                const q = query(collection(db, "clients"), orderBy("timestamp", "asc"));
                const querySnapshot = await getDocs(q);
                allClientsGlobal = [];
                let index = 1;
                querySnapshot.forEach((doc) => {
                    allClientsGlobal.push({ docId: doc.id, serial: index++, ...doc.data() });
                });
                renderDashboard(allClientsGlobal);
            } catch (error) {
                console.error("Error fetching data: ", error);
                document.getElementById('allClientsGrid').innerHTML = `<div class="no-data" style="color:var(--danger)">ডেটা লোড করতে সমস্যা হচ্ছে। আপনার ফায়ারবেস Firestore Rules 'Test Mode' এ আছে কিনা চেক করুন।</div>`;
            }
        }

// ক্লাউডে নতুন ডেটা সেভ করা (Auto Image Compression সহ)
        async function saveClient(e) {
            e.preventDefault();
            const submitBtn = document.getElementById('submitBtn');
            submitBtn.innerText = "সংরক্ষণ হচ্ছে...";
            submitBtn.disabled = true;

            const fileNo = document.getElementById('fileNo').value.trim();
            const name = document.getElementById('clientName').value.trim();
            const jobType = document.getElementById('jobType').value.trim();
            const phone = document.getElementById('phone').value.trim();
            const handlerName = document.getElementById('handlerName').value.trim();
            const imgFile = document.getElementById('agreementImg').files[0];

            // ছবি সিলেক্ট না করলে অ্যালার্ট দেবে
            if (!imgFile) {
                alert("দয়া করে চুক্তিপত্রের ছবি সিলেক্ট করুন।");
                submitBtn.innerText = "ক্লাউড ডেটাবেজে সংরক্ষণ করুন";
                submitBtn.disabled = false;
                return;
            }

            const reader = new FileReader();
            reader.onloadend = function () {
                const img = new Image();
                img.src = reader.result;
                img.onload = async function () {
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');

                    // ছবির সর্বোচ্চ সাইজ নির্ধারণ (১০০০ পিক্সেল)
                    const MAX_WIDTH = 1000;
                    const MAX_HEIGHT = 1000;
                    let width = img.width;
                    let height = img.height;

                    if (width > height) {
                        if (width > MAX_WIDTH) {
                            height *= MAX_WIDTH / width;
                            width = MAX_WIDTH;
                        }
                    } else {
                        if (height > MAX_HEIGHT) {
                            width *= MAX_HEIGHT / height;
                            height = MAX_HEIGHT;
                        }
                    }

                    canvas.width = width;
                    canvas.height = height;
                    ctx.drawImage(img, 0, 0, width, height);

                    // ছবি কমপ্রেস করে ৬০% কোয়ালিটিতে আনা হচ্ছে
                    const compressedBase64 = canvas.toDataURL('image/jpeg', 0.6);

                    try {
                        await addDoc(collection(db, "clients"), {
                            fileNo: fileNo,
                            name: name,
                            jobType: jobType,
                            phone: phone,
                            handlerName: handlerName,
                            image: compressedBase64, // সাইজ ছোট করা ছবি ডাটাবেজে যাবে
                            timestamp: new Date().getTime()
                        });
                        
                        toggleModal(false);
                        submitBtn.innerText = "ক্লাউড ডেটাবেজে সংরক্ষণ করুন";
                        submitBtn.disabled = false;
                        fetchClients();
                    } catch (error) {
                        console.error("Error saving document: ", error);
                        alert("ডাটা সেভ হয়নি! আসল সমস্যা: " + error.message);
                        submitBtn.innerText = "ক্লাউড ডেটাবেজে সংরক্ষণ করুন";
                        submitBtn.disabled = false;
                    }
                };
            };
            
            if (imgFile) reader.readAsDataURL(imgFile);
        }

        // স্ক্রিনে ডেটা সাজানো
        function renderDashboard(dataArray) {
            const recentGrid = document.getElementById('recentGrid');
            const allClientsGrid = document.getElementById('allClientsGrid');
            recentGrid.innerHTML = ''; allClientsGrid.innerHTML = '';

            if (dataArray.length === 0) {
                allClientsGrid.innerHTML = `<div class="no-data"><i class="fa-regular fa-folder-open" style="font-size: 2.5rem; margin-bottom: 12px; display:block; color:var(--accent);"></i> কোনো রেকর্ড নেই। '+' আইকনে চাপুন।</div>`;
                document.getElementById('recentSectionWrapper').style.display = 'none';
                return;
            }
            document.getElementById('recentSectionWrapper').style.display = 'block';

            const threeDaysAgo = new Date().getTime() - (3 * 24 * 60 * 60 * 1000);
            let hasRecent = false;

            [...dataArray].reverse().forEach((client) => {
                const cardHTML = document.createElement('div');
                cardHTML.className = 'client-card';
                cardHTML.innerHTML = `
                    <div class="card-header">
                        <span class="file-badge">ফাইল: ${client.fileNo}</span>
                        <span class="serial-badge">#${client.serial}</span>
                    </div>
                    <h3>${client.name}</h3>
                    <div class="card-meta">
                        <div><i class="fa-solid fa-briefcase"></i> <span>কাজ: ${client.jobType}</span></div>
                        <div><i class="fa-solid fa-user-gear"></i> <span>স্টাফ: ${client.handlerName}</span></div>
                    </div>
                `;
                cardHTML.onclick = () => openProfile(client.docId);
                allClientsGrid.appendChild(cardHTML);

                if (client.timestamp >= threeDaysAgo) {
                    const recentCard = cardHTML.cloneNode(true);
                    recentCard.onclick = () => openProfile(client.docId);
                    recentGrid.appendChild(recentCard);
                    hasRecent = true;
                }
            });

            if (!hasRecent) recentGrid.innerHTML = `<div class="no-data" style="padding: 1.5rem; border:none;">গত ৩ দিনে কোনো নতুন চুক্তিপত্র যোগ করা হয়নি।</div>`;
        }

        function handleSearch() {
            const queryText = document.getElementById('searchBox').value.toLowerCase().trim();
            const filtered = allClientsGlobal.filter(c => 
                c.fileNo.toLowerCase().includes(queryText) || c.name.toLowerCase().includes(queryText)
            );
            renderDashboard(filtered);
        }

        // আলাদা প্রোফাইল পেজ জেনারেট
        window.openProfile = function(docId) {
            const client = allClientsGlobal.find(c => c.docId === docId);
            if (!client) return;

            const entryDate = new Date(client.timestamp).toLocaleDateString('bn-BD', { year: 'numeric', month: 'long', day: 'numeric'});
            const profileContainer = document.getElementById('profileContainer');
            
            profileContainer.innerHTML = `
                <div class="profile-info">
                    <h2>${client.name}</h2>
                    <div class="info-item"><div class="info-left"><i class="fa-solid fa-hashtag"></i> <span>সিরিয়াল নাম্বার</span></div><span class="info-value">#${client.serial}</span></div>
                    <div class="info-item"><div class="info-left"><i class="fa-solid fa-folder-open"></i> <span>ফাইল নাম্বার</span></div><span class="info-value" style="color:var(--accent); font-weight:700;">${client.fileNo}</span></div>
                    <div class="info-item"><div class="info-left"><i class="fa-solid fa-briefcase"></i> <span>কাজের ধরন</span></div><span class="info-value">${client.jobType}</span></div>
                    <div class="info-item"><div class="info-left"><i class="fa-solid fa-phone"></i> <span>ফোন নাম্বার</span></div><span class="info-value">${client.phone}</span></div>
                    <div class="info-item"><div class="info-left"><i class="fa-solid fa-user-check"></i> <span>চুক্তি করেছেন</span></div><span class="info-value" style="color:var(--success); font-weight:600;">${client.handlerName}</span></div>
                    <div class="info-item"><div class="info-left"><i class="fa-solid fa-calendar-check"></i> <span>চুক্তির তারিখ</span></div><span class="info-value">${entryDate}</span></div>
                    <div class="delete-action-container">
                        <button class="delete-btn" onclick="deleteClient('${client.docId}')"><i class="fa-solid fa-trash-can"></i> চুক্তি শেষ / ক্লাউড থেকে ডিলিট করুন</button>
                    </div>
                </div>
                <div class="document-area">
                    <p style="margin-bottom:8px; color:var(--text-muted); font-size:0.9rem;"><i class="fa-solid fa-file-image"></i> ডিজিটাল চুক্তিপত্রের কপি</p>
                    <img src="${client.image}" alt="চুক্তিপত্র">
                </div>
            `;
            document.getElementById('mainDashboard').classList.add('hidden');
            document.getElementById('profileView').classList.add('active');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // ক্লাউড থেকে পার্মানেন্টলি ডিলিট করার লজিক
       window.deleteClient = async function(docId) {
    if (confirm("আপনি কি নিশ্চিত যে এই রেকর্ডটি ক্লাউড ডাটাবেজ থেকে চিরতরে ডিলিট করতে চান? এটি করলে সব ডিভাইস থেকে মুছে যাবে।")) {
        try {
            // ভুল কোডটি বদলে এখানে সরাসরি db ব্যবহার করা হয়েছে
            await deleteDoc(doc(db, "clients", docId)); 
            document.getElementById('profileView').classList.remove('active');
            document.getElementById('mainDashboard').classList.remove('hidden');
            fetchClients();
        } catch (error) {
            console.error(error);
            alert("ডিলিট করা সম্ভব হয়নি।");
        }
    }
}

        // প্রথমবার ওপেনিংয়ে লোড রান
        fetchClients();
    </script>
